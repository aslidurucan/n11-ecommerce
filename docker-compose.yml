# ===================================================================
# n11-ecommerce - Tüm Stack
# Tek komutla ayağa kaldır: docker-compose up -d
# ===================================================================
# NOT: Bu dosyada SADECE altyapı servisleri tanımlı (Postgres, Redis,
# RabbitMQ, Keycloak). Backend servisleri Day 4'te eklenecek (Jib ile).

services:
  # ============= POSTGRESQL =============
  # Tek instance, içinde 6 ayrı database (servis başına 1 tane).
  # Production'da her servisin ayrı Postgres cluster'ı olmalı.
  postgres:
    image: postgres:16-alpine
    container_name: n11-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_MULTIPLE_DATABASES: userdb,productdb,orderdb,stockdb,cartdb,keycloakdb
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/init-db/init-multi-db.sh:/docker-entrypoint-initdb.d/init-multi-db.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============= REDIS =============
  # 2 amaç: (1) Cart Service için cart store, (2) Order için card-cache + rate limiting
  redis:
    image: redis:7-alpine
    container_name: n11-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============= RABBITMQ =============
  # Saga event-bus. Management UI: http://localhost:15672 (guest/guest)
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: n11-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ============= KEYCLOAK =============
  # Identity Provider. Admin: http://localhost:8090 (admin/admin)
  # Realm import: ./keycloak/import/realm-export.json (Day 1'de oluştur)
  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: n11-keycloak
    command:
      - "start-dev"
      - "--import-realm"
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN_USERNAME:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloakdb
      KC_DB_USERNAME: ${POSTGRES_USER:-postgres}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      KC_HOSTNAME: localhost
      KC_HTTP_PORT: 8090
      KC_HEALTH_ENABLED: "true"
    ports:
      - "8090:8090"
    volumes:
      - ./keycloak/import:/opt/keycloak/data/import
    depends_on:
      postgres:
        condition: service_healthy

  # ============= EUREKA SERVER =============
  # eureka-server:
  #   image: n11ecommerce/eureka-server:1.0.0
  #   container_name: n11-eureka
  #   ports:
  #     - "8761:8761"

  # NOT: Day 4'te eklenecek. Şimdilik backend servislerini IDE'den çalıştırın.

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:

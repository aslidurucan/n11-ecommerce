# ===================================================================
# n11-ecommerce — Altyapı Servisleri (Postgres, Redis, RabbitMQ, Keycloak)
# ===================================================================
# Kullanım:
#   - Sadece infra (geliştirici IDE'den backend çalıştırır):
#       docker-compose up -d
#   - Tam stack (infra + 9 backend servisi):
#       docker-compose -f docker-compose.yml -f docker-compose.full.yml up -d
#
# Tam stack için önce backend image'larını build edin:
#   cd backend && mvn -B clean compile jib:dockerBuild

services:
  # ============= POSTGRESQL =============
  postgres:
    image: postgres:16-alpine
    container_name: n11-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_MULTIPLE_DATABASES: userdb,productdb,orderdb,stockdb,cartdb,keycloakdb
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/init-db/init-multi-db.sh:/docker-entrypoint-initdb.d/init-multi-db.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - n11-network

  # ============= REDIS =============
  redis:
    image: redis:7-alpine
    container_name: n11-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - n11-network

  # ============= RABBITMQ =============
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: n11-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - n11-network

  # ============= KEYCLOAK =============
  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: n11-keycloak
    command:
      - "start-dev"
      - "--import-realm"
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN_USERNAME:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloakdb
      KC_DB_USERNAME: ${POSTGRES_USER:-postgres}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      KC_HOSTNAME: localhost
      KC_HTTP_PORT: 8090
      KC_HEALTH_ENABLED: "true"
    ports:
      - "8090:8090"
    volumes:
      - ./keycloak/import:/opt/keycloak/data/import
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8090/health/ready"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - n11-network

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:

networks:
  n11-network:
    driver: bridge
    name: n11-network
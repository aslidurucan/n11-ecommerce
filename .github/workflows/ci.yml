name: CI - Build & Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      rabbitmq:
        image: rabbitmq:3.13-management-alpine
        ports:
          - 5672:5672

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build with Maven
        working-directory: backend
        run: mvn -B clean package -DskipTests

      - name: Run tests
        working-directory: backend
        run: mvn -B test
        env:
          POSTGRES_URL: jdbc:postgresql://localhost:5432/postgres
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          RABBITMQ_HOST: localhost
          REDIS_HOST: localhost

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: '**/target/surefire-reports/*.xml'

  publish-image:
    needs: build-test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        service:
          - eureka-server
          - config-server
          - api-gateway
          - user-service
          - product-service
          - cart-service
          - order-service
          - stock-service
          - notification-service

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & push image with Jib
        working-directory: backend
        run: |
          mvn -B -pl ${{ matrix.service }} -am compile jib:build \
            -Djib.to.image=${{ secrets.DOCKERHUB_USERNAME }}/n11ecommerce-${{ matrix.service }}:${{ github.sha }} \
            -Djib.to.tags=latest

  notify-slack:
    needs: [build-test, publish-image]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Slack notification
        if: env.SLACK_WEBHOOK_URL != ''
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          STATUS="${{ contains(needs.*.result, 'failure') && '❌ FAILED' || '✅ SUCCESS' }}"
          curl -X POST -H 'Content-type: application/json' \
            --data "{\"text\":\"Deploy $STATUS for n11-ecommerce — ${GITHUB_REF}\"}" \
            $SLACK_WEBHOOK_URL
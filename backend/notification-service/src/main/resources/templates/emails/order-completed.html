<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Siparişiniz Onaylandı</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f4f4f4; margin: 0; padding: 0; }
    .container { max-width: 560px; margin: 40px auto; background: #fff; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,.1); }
    .header { background: #22c55e; color: #fff; padding: 28px 32px; }
    .header h1 { margin: 0; font-size: 22px; }
    .body { padding: 28px 32px; color: #333; line-height: 1.6; }
    .detail-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #eee; }
    .label { color: #666; }
    .value { font-weight: bold; }
    .footer { text-align: center; padding: 20px; font-size: 12px; color: #aaa; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Siparişiniz Onaylandı!</h1>
    </div>
    <div class="body">
      <p>Merhaba,</p>
      <p>Siparişiniz başarıyla alındı ve işleme koyuldu. Aşağıda sipariş detaylarınızı bulabilirsiniz.</p>
      <div class="detail-row">
        <span class="label">Sipariş No</span>
        <span class="value" th:text="'#' + ${orderId}"></span>
      </div>
      <div class="detail-row">
        <span class="label">Toplam Tutar</span>
        <span class="value" th:text="${totalAmount} + ' TL'"></span>
      </div>
      <p style="margin-top: 24px;">Alışverişiniz için teşekkür ederiz!</p>
    </div>
    <div class="footer">n11 E-Ticaret &copy; 2024</div>
  </div>
</body>
</html>

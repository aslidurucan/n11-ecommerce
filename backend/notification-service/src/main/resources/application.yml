server:
  port: 8086

spring:
  application:
    name: notification-service
  config:
    import: optional:configserver:${CONFIG_URI:http://localhost:8762}
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8090/realms/ecommerce}
          jwk-set-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8090/realms/ecommerce}/protocol/openid-connect/certs
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:noreply@example.com}
    password: ${MAIL_PASSWORD:changeme}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

notification:
  mail:
    from: ${MAIL_FROM:noreply@n11ecommerce.com}
  websocket:
    allowed-origins:
      - "http://localhost:*"
      - "http://127.0.0.1:*"

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
